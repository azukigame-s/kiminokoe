name: macOS Build

on:
  push:
    branches:
      - release/beta
  workflow_dispatch:

jobs:
  export-macos:
    name: Export for macOS
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup Godot 4.6.2
        run: |
          wget -q "https://github.com/godotengine/godot/releases/download/4.6.2-stable/Godot_v4.6.2-stable_macos.universal.zip" -O godot.zip
          unzip -q godot.zip
          chmod +x "Godot.app/Contents/MacOS/Godot"
          sudo mv "Godot.app" /Applications/
          echo "GODOT=/Applications/Godot.app/Contents/MacOS/Godot" >> $GITHUB_ENV

      - name: Install Export Templates
        run: |
          set -e
          TEMPLATES_DIR="$HOME/Library/Application Support/Godot/export_templates/4.6.2.stable"
          mkdir -p "$TEMPLATES_DIR"
          wget -q "https://github.com/godotengine/godot/releases/download/4.6.2-stable/Godot_v4.6.2-stable_export_templates.tpz" -O templates.tpz
          unzip -o templates.tpz -d "$TEMPLATES_DIR"
          if [ -d "$TEMPLATES_DIR/templates" ] && [ ! -f "$TEMPLATES_DIR/macos.zip" ]; then
            mv "$TEMPLATES_DIR/templates/"* "$TEMPLATES_DIR/"
            rm -rf "$TEMPLATES_DIR/templates"
          fi
          echo "=== Templates installed ==="
          ls -la "$TEMPLATES_DIR/"

      - name: Export macOS
        run: |
          mkdir -p build
          "$GODOT" --headless --path . --export-release "macOS" ./build/キミノコエ体験版.app

      - name: Fix permissions and sign (ad-hoc)
        run: |
          find "./build/キミノコエ体験版.app" -type f | while read f; do
            if file "$f" | grep -q "executable"; then
              chmod +x "$f"
            fi
          done
          codesign --force --deep --sign - "./build/キミノコエ体験版.app"

      - name: Package with ditto (権限保持zip)
        run: |
          cd build
          ditto -c -k --keepParent "キミノコエ体験版.app" "キミノコエ体験版_macos.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: kiminokoe-macos
          path: build/キミノコエ体験版_macos.zip
          retention-days: 30
